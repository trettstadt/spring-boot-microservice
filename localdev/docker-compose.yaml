services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: appuser
      KC_DB_PASSWORD: apppassword
    ports:
      - "8180:8080"
    depends_on:
      - postgres

  # lgtm and promtail are disabled when using Grafana Cloud.
  # See application-localdev.yaml for OTEL exporter config pointing to Grafana Cloud.
  # lgtm:
  #   image: grafana/otel-lgtm:latest
  #   pid: "host"
  #   privileged: true
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   ports:
  #     - "3000:3000"     # Grafana
  #     - "4317:4317"     # OTLP gRPC receiver
  #     - "4318:4318"     # OTLP HTTP receiver
  #     - "9090:9090"     # Prometheus web UI
  #     - "3200:3200"     # Tempo
  #     - "3100:3100"     # Loki
  # 
  # promtail:
  #   image: grafana/promtail:latest
  #   volumes:
  #     - ./promtail.yaml:/etc/promtail/config.yaml:ro
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   depends_on:
  #     - lgtm

volumes:
  postgres_data:
