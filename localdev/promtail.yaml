server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://lgtm:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_compose_container_number']
        target_label: container_number
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: log_stream
      # Drop the lgtm container's own logs to avoid infinite loops
      - source_labels: ['__meta_docker_compose_service']
        regex: lgtm
        action: drop
    pipeline_stages:
      # Parse Docker JSON log wrapper: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # Parse the inner Logstash-encoded JSON from the log field
      - json:
          source: log
          expressions:
            level: level
            logger: logger_name
            thread: thread_name
            message: message
            trace_id: trace_id
            span_id: span_id
            service_name: service_name
      # Set log level as a label for easy filtering in Grafana
      - labels:
          level: null
