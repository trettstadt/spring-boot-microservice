# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image (amd64)
      run: |
        mvn -B spring-boot:build-image \
          -Dspring-boot.build-image.imageName=ghcr.io/${{github.repository}}:${{github.sha}}-amd64 \
          -Dspring-boot.build-image.publish=true
    - name: Build and push Docker image (arm64)
      run: |
        mvn -B spring-boot:build-image \
          -Dspring-boot.build-image.imageName=ghcr.io/${{github.repository}}:${{github.sha}}-arm64 \
          -Dspring-boot.build-image.publish=true \
          -Dspring-boot.build-image.environment.BP_OCI_ARCHITECTURE=arm64
    - name: Create and push multi-arch manifest
      run: |
        docker manifest create ghcr.io/${{github.repository}}:${{github.sha}} \
          ghcr.io/${{github.repository}}:${{github.sha}}-amd64 \
          ghcr.io/${{github.repository}}:${{github.sha}}-arm64
        docker manifest push ghcr.io/${{github.repository}}:${{github.sha}}
