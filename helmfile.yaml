environments:
  default:
    values:
      - helmfile/environments/default/values.yaml
  prod:
    values:
      - helmfile/environments/prod/values.yaml

---
repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: traefik
    url: https://helm.traefik.io/traefik
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: codecentric
    url: https://codecentric.github.io/helm-charts
  - name: external-secrets
    url: https://charts.external-secrets.io

releases:
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.16.2
    values:
      - installCRDs: true
        replicaCount: 1
    wait: true
    timeout: 180

  - name: traefik
    namespace: traefik
    createNamespace: true
    chart: traefik/traefik
    version: v34.4.1
    values:
      - helmfile/values/traefik.yaml
    wait: true
    timeout: 180

  - name: postgresql
    namespace: booking
    createNamespace: true
    chart: bitnami/postgresql
    values:
      - auth:
          database: microservicedb
          username: appuser
          password: apppassword
      - primary:
          persistence:
            storageClass: hcloud-volumes
    wait: true
    timeout: 600

  - name: keycloak
    namespace: booking
    createNamespace: true
    chart: codecentric/keycloakx
    values:
      - helmfile/values/keycloakx.yaml
    needs:
      - booking/postgresql
    wait: true
    timeout: 900

  - name: external-secrets
    namespace: external-secrets
    createNamespace: true
    chart: external-secrets/external-secrets
    wait: true
    timeout: 180

  - name: booking
    namespace: booking
    createNamespace: true
    chart: ./gitops/booking
    values:
      - helmfile/values/booking.yaml
      - helmfile/environments/{{ .Environment.Name }}/booking.yaml
    needs:
      - external-secrets/external-secrets
    wait: true
    timeout: 300
