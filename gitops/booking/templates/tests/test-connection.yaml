apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "booking.fullname" . }}-test-connection"
  labels:
    {{- include "booking.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['-q', '-O', '/dev/null', 'http://{{ include "booking.fullname" . }}:{{ .Values.service.port }}/actuator/health']
  restartPolicy: Never
